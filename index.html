<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>솔담마켓 POP 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', sans-serif;
  background: #111827;
  display: flex;
  min-height: 100vh;
}

/* ── 사이드바 ── */
.sb {
  width: 260px; min-width: 260px;
  background: #0d1117;
  border-right: 1px solid #1e2533;
  padding: 20px 14px;
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
}
.sb-title {
  font-size: 10px; font-weight: 700; color: #FFCD00;
  letter-spacing: .15em; text-transform: uppercase;
  border-bottom: 1px solid #1e2533; padding-bottom: 10px;
}
.sec { display: flex; flex-direction: column; gap: 7px; }
.sec-lbl {
  font-size: 9px; font-weight: 700; color: #a0aec0;
  letter-spacing: .1em; text-transform: uppercase;
}
label { font-size: 11px; color: #cbd5e0; display: block; margin-bottom: 2px; }
input, select {
  width: 100%; background: #161b27; border: 1px solid #1e2533;
  border-radius: 5px; padding: 7px 9px;
  font-size: 13px; color: #fff; font-family: 'Pretendard', sans-serif;
  outline: none; transition: border-color .15s;
}
input:focus, select:focus { border-color: #FFCD00; }
select option { background: #161b27; }

.upload {
  border: 1.5px dashed #1e2533; border-radius: 7px;
  padding: 14px; text-align: center; cursor: pointer;
  background: #161b27; transition: border-color .2s; position: relative;
}
.upload:hover { border-color: #FFCD00; }
.upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-txt { font-size: 11px; color: #a0aec0; }
.upload-hint { font-size: 10px; color: #718096; margin-top: 2px; }
#prev-img { width: 100%; max-height: 100px; object-fit: contain; border-radius: 4px; display: none; }
.btn-clr { font-size: 10px; color: #FFCD00; cursor: pointer; margin-top: 5px; display: none; background: none; border: none; font-family: inherit; }
.disc-auto { font-size: 11px; color: #FFCD00; background: rgba(255,205,0,.08); border-radius: 4px; padding: 3px 8px; display: none; }

.btn-dl {
  width: 100%; padding: 11px; background: #FFCD00; color: #1a0040;
  font-weight: 900; font-size: 13px; border: none; border-radius: 7px;
  cursor: pointer; font-family: inherit; transition: .15s;
}
.btn-dl:hover { background: #ffe033; }
.btn-dl:disabled { opacity: .5; cursor: not-allowed; }

/* ── 프리뷰 ── */
.preview {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 24px; background: #0a0a1a;
}

/*
  POP 컨테이너
  비율: 1440:2560 = 9:16
*/
#pop {
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 20px 60px rgba(0,0,0,.8);
  border-radius: 0;
  overflow: hidden;
  background: #2F006D;
  /* 크기는 JS changeESL()로 동적 설정 */
}

/* 배경 이미지 */
#pop > img.bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: fill;
  display: block;
  z-index: 1;
}

/*
  ============================================
  좌표 기준: 새 배경 이미지 (973x1731)
  흰카드: top=14.8% ~ bottom=73.5%
          left=6.0%  ~ right=93.9%
  말풍선컷: y≈65.5%에서 right=55%로 꺾임
  카드 하단 퍼플 영역: 73.5% ~ 100% (26.5%)
  ============================================

  OFF배지: 카드 bottom(73.5%) 바로 아래, 우측
    → top=74%  height≈6%  left=50%  right=6%

  정상가: 배지 아래
    → top=80.5%  height≈5%  right정렬

  대형가격: 정상가 아래
    → top=85.5%  bottom=97%  left=6%
  ============================================
*/

/* 제목 (카드 위 퍼플 영역) */
.el-title {
  position: absolute;
  top: 2%; left: 0; right: 0; height: 11%;
  display: flex; align-items: center; justify-content: center;
  padding: 0 6%;
  z-index: 10;
}
.el-title span {
  font-size: clamp(15px, 4.8vw, 38px);
  font-weight: 900; color: #FFCD00;
  text-align: center; letter-spacing: -.02em; line-height: 1.2;
  word-break: keep-all;
  white-space: nowrap;
  display: inline-block;
}

/* 상품명 (이미지 하단) */
.el-pname {
  position: absolute;
  top: 53%; left: 6%; right: 6%; height: 7%;
  display: flex; align-items: center; justify-content: center;
  z-index: 6;
}
.el-pname span {
  font-size: clamp(11px, 3.2vw, 26px);
  font-weight: 900; color: #000;
  text-align: center; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}

/* 13.3" 전용 이미지 박스 */
#pop[data-esl="13"] .el-product {
  width: 58%;
  top: 14%;
}

/* 상품 이미지 (흰카드 내부) */
.el-product {
  position: absolute;
  top: 17%; left: 50%;
  transform: translateX(-50%);
  width: 70%;
  aspect-ratio: 1 / 1;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  z-index: 5;
}
.el-product img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,.12));
}
.el-product .ph {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: #c0b0e0;
}
.el-product .ph svg { opacity: .3; }
.el-product .ph span { font-size: 10px; opacity: .5; }

/*
  X축 기준선: 정상가/판매가/배지 모두 동일
  left=6%  right=6%
*/

/* OFF 배지 - 정상가/판매가와 동일 X, Y를 위로 */
.el-off {
  position: absolute;
  top: 68%; height: 7.5%;
  left: 6%; right: 6%;
  display: flex; align-items: center; justify-content: flex-end;
  z-index: 10;
}
.el-off-inner {
  background: #FFCD00;
  border-radius: 8px;
  padding: 0 3%;
  height: 83%;
  display: flex; align-items: center; justify-content: center;
}
.el-off-inner span {
  font-size: clamp(11px, 3vw, 24px);
  font-weight: 900; color: #2F006D;
  letter-spacing: .02em; white-space: nowrap;
}

/* 정상가 - 흰카드 왼쪽 경계(6%)에 맞춤, 폰트 크게 */
.el-orig {
  position: absolute;
  top: 77.5%; height: 6%;
  left: 6%; right: 6%;           /* 동일 X */
  display: flex; align-items: center; justify-content: flex-end;
  z-index: 10;
}
.el-orig span {
  font-size: clamp(10px, 2.7vw, 21px);   /* 폰트 키움 */
  font-weight: 700; color: rgba(255,255,255,.85);
  text-decoration: line-through;
  text-decoration-color: rgba(255,205,0,.8);
  text-decoration-thickness: 2px;
  white-space: nowrap;
}

/* 1+1 전용: "2개" 텍스트 */
.el-1plus1 {
  position: absolute;
  top: 68%; height: 10%;
  left: 6%; right: 6%;
  display: flex; align-items: center; justify-content: flex-start;
  z-index: 10;
}
.el-1plus1-badge {
  font-size: clamp(22px, 7vw, 56px);
  font-weight: 900; color: #FFCD00;
  letter-spacing: -.02em;
}

/* 2+1 전용: 1개/3개 가격 */
.el-2plus1 {
  position: absolute;
  top: 68%; bottom: 2.5%;
  left: 6%; right: 6%;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end; gap: 1%;
  z-index: 10;
}
.el-2plus1-row {
  display: flex; align-items: baseline; justify-content: flex-end; gap: 2%;
}
.el-2plus1-label {
  font-size: clamp(12px, 3.2vw, 26px);
  font-weight: 700; color: rgba(255,255,255,.8);
  white-space: nowrap; min-width: 2em;
}
.el-2plus1-price {
  font-size: clamp(22px, 7vw, 56px);
  font-weight: 900; color: #FFCD00;
  letter-spacing: -.04em; line-height: 1;
}
.el-2plus1-unit {
  font-size: clamp(22px, 7vw, 56px);
  font-weight: 900; color: #FFCD00;
  letter-spacing: -.04em; line-height: 1;
}

/* 판매가 - 우측정렬, 숫자와 '원' 동일 폰트 */
.el-price {
  position: absolute;
  top: 83.5%; bottom: 2.5%;
  left: 6%; right: 6%;           /* 동일 X */
  display: flex; align-items: center; justify-content: flex-end;  /* 우측정렬 */
  gap: 0;
  z-index: 10;
}
.el-price-num {
  font-size: clamp(28px, 9vw, 72px);
  font-weight: 900; color: #FFCD00;
  letter-spacing: -.04em; line-height: 1;
}
.el-price-unit {
  font-size: clamp(28px, 9vw, 72px);   /* 숫자와 동일 크기 */
  font-weight: 900; color: #FFCD00;
  letter-spacing: -.04em; line-height: 1;
}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-title">솔담마켓 POP 생성기</div>

  <div class="sec">
    <div class="sec-lbl">ESL 인치</div>
    <select id="i-esl" onchange="changeESL()">
      <option value="32">32" — 1440 × 2560 px</option>
      <option value="13">13.3" — 1200 × 1600 px</option>
      <option value="8">8.2" — 576 × 1024 px</option>
    </select>
    <div id="esl-info" style="font-size:10px;color:#a0aec0;padding:2px 0;">출력 해상도: 1440 × 2560 px</div>
  </div>

  <div class="sec">
    <div class="sec-lbl">프로모션 유형</div>
    <select id="i-promo" onchange="render()">
      <option>TIME SALE</option>
      <option>특가 SALE</option>
      <option>1+1</option>
      <option>2+1</option>
    </select>
  </div>

  <div class="sec">
    <div class="sec-lbl">상품명</div>
    <input type="text" id="i-name" placeholder="상품명을 입력하세요" oninput="render()">
  </div>

  <div class="sec">
    <div class="sec-lbl">상품 이미지</div>
    <div class="upload" id="upload-box" onclick="document.getElementById('i-img').click()">
      <input type="file" id="i-img" accept="image/*"
             onclick="event.stopPropagation()" onchange="loadImg(event)">
      <div id="upload-ph">
        <div class="upload-txt">📷 클릭하여 업로드</div>
        <div class="upload-hint">배경 제거 PNG 권장</div>
      </div>
      <img id="prev-img" src="" alt="">
      <button class="btn-clr" id="btn-clr" onclick="clearImg(event)">✕ 이미지 제거</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl">가격</div>
    <div>
      <label>판매가 (원)</label>
      <input type="number" id="i-sale" value="1490" oninput="render()">
    </div>
    <div>
      <label>정상가 (원)</label>
      <input type="number" id="i-orig" value="2380" oninput="render()">
    </div>
    <div>
      <label>할인율 % <span style="color:#2d3748;font-size:10px">(빈칸=자동)</span></label>
      <input type="number" id="i-disc" placeholder="자동" min="1" max="99" oninput="render()">
    </div>
    <div class="disc-auto" id="disc-auto"></div>
    <div id="price3-sec" style="display:none">
      <label>3개 가격 (원)</label>
      <input type="number" id="i-price3" placeholder="3개 묶음 가격" oninput="render()">
    </div>
  </div>

  <button class="btn-dl" id="btn-dl" onclick="dlPNG()">⬇ PNG 다운로드</button>
</aside>

<div class="preview">

<script>
let imgSrc = null;
const fmt = n => Number(n).toLocaleString('ko-KR');
const show = (el, v) => el.style.display = v ? '' : 'none';

// ESL 사이즈 정의
const ESL_SIZES = {
  '32': { w: 1440, h: 2560, label: '1440 × 2560 px' },
  '13': { w: 1200, h: 1600, label: '1200 × 1600 px' },
  '8':  { w:  576, h: 1024, label: '576 × 1024 px'  },
};

function changeESL() {
  const key = document.getElementById('i-esl').value;
  const { w, h, label } = ESL_SIZES[key];
  const pop = document.getElementById('pop');
  const maxH = Math.min(window.innerHeight * 0.82, 656);
  const maxW = window.innerWidth - 260 - 48; // sidebar + padding
  // 비율 유지하면서 화면에 맞게
  let dispH = maxH;
  let dispW = dispH * w / h;
  if (dispW > maxW) { dispW = maxW; dispH = dispW * h / w; }
  pop.style.width  = dispW + 'px';
  pop.style.height = dispH + 'px';
  document.getElementById('esl-info').textContent = '출력 해상도: ' + label;

  pop.dataset.esl = key;
  render();
  updatePnamePosition();
}

function getDisc() {
  const m = parseInt(document.getElementById('i-disc').value);
  if (m >= 1 && m <= 99) return m;
  const s = parseInt(document.getElementById('i-sale').value) || 0;
  const o = parseInt(document.getElementById('i-orig').value) || 0;
  return (s > 0 && o > s) ? Math.round((1 - s/o)*100) : null;
}

function adjustTitleFont(targetSize) {
  const span = document.getElementById('el-title');
  const container = span.closest('.el-title');
  span.style.fontSize = targetSize || '';
  const maxW = container.offsetWidth * 0.96;
  let size = parseFloat(getComputedStyle(span).fontSize);
  while (span.scrollWidth > maxW && size > 10) {
    size -= 0.5;
    span.style.fontSize = size + 'px';
  }
}

function render() {
  const promo = document.getElementById('i-promo').value;
  const titleEl  = document.getElementById('el-title');
  const titleWrap = document.querySelector('.el-title');

  titleEl.textContent = promo;

  const isLeftBig = ['1+1', '2+1', '특가 SALE', 'TIME SALE'].includes(promo);
  if (isLeftBig) {
    titleWrap.style.justifyContent = 'flex-start';
    titleWrap.style.paddingLeft = '6%';
    titleEl.style.textAlign = 'left';
    const fontSize = ['1+1', '2+1'].includes(promo)
      ? 'clamp(35px, 10.8vw, 86px)'
      : 'clamp(18px, 5.5vw, 44px)';
    adjustTitleFont(fontSize);
  } else {
    titleWrap.style.justifyContent = '';
    titleWrap.style.paddingLeft = '';
    titleEl.style.textAlign = '';
    adjustTitleFont('');
  }

  const s = document.getElementById('i-sale').value;
  document.getElementById('el-price').textContent = s ? fmt(s) : '—';

  const is1p1 = promo === '1+1';
  const is2p1 = promo === '2+1';

  show(document.getElementById('el-1plus1-wrap'), is1p1);
  show(document.getElementById('el-2plus1-wrap'), is2p1);
  show(document.getElementById('el-price-wrap'), !is2p1);
  show(document.getElementById('price3-sec'), is2p1);

  if (is1p1 || is2p1) {
    show(document.getElementById('el-off-wrap'), false);
    show(document.getElementById('disc-auto'), false);
    show(document.getElementById('el-orig-wrap'), false);
    if (is2p1) {
      const p3 = document.getElementById('i-price3').value;
      document.getElementById('el-2p1-price1').textContent = s ? fmt(s) : '—';
      document.getElementById('el-2p1-price3').textContent = p3 ? fmt(p3) : '—';
    }
  } else {
    const o = document.getElementById('i-orig').value;
    if (o && parseInt(o) > 0) {
      document.getElementById('el-orig').textContent = '정상가 ' + fmt(o) + '원';
      show(document.getElementById('el-orig-wrap'), true);
    } else {
      show(document.getElementById('el-orig-wrap'), false);
    }
    const d = getDisc();
    if (d) {
      document.getElementById('el-off').textContent = d + '% OFF';
      show(document.getElementById('el-off-wrap'), true);
      const isAuto = !document.getElementById('i-disc').value;
      const info = document.getElementById('disc-auto');
      info.textContent = isAuto ? '자동: ' + d + '% 할인' : '';
      show(info, isAuto);
    } else {
      show(document.getElementById('el-off-wrap'), false);
      show(document.getElementById('disc-auto'), false);
    }
  }

  const pname = document.getElementById('i-name').value.trim();
  document.getElementById('el-pname').textContent = pname;
  show(document.getElementById('el-pname-wrap'), pname !== '');

  const elImg = document.getElementById('el-img');
  const elPh  = document.getElementById('el-ph');
  if (imgSrc) {
    elImg.onload = () => updatePnamePosition();
    elImg.src = imgSrc;
    elImg.style.display = 'block';
    show(elPh, false);
    if (elImg.complete && elImg.naturalWidth) updatePnamePosition();
  } else {
    elImg.style.display = 'none';
    show(elPh, true);
  }
}

function updatePnamePosition() {
  const elImg    = document.getElementById('el-img');
  const elProduct = document.getElementById('el-product');
  const elPnameWrap = document.getElementById('el-pname-wrap');
  if (!imgSrc || !elImg.naturalWidth || !elImg.naturalHeight) return;

  const cW = elProduct.offsetWidth;
  const cH = elProduct.offsetHeight;
  const cTop = elProduct.offsetTop;
  const imgRatio = elImg.naturalWidth / elImg.naturalHeight;
  const containerRatio = cW / cH;

  // object-fit: contain 기준 실제 렌더링 높이 계산
  const renderedH = imgRatio >= containerRatio ? cW / imgRatio : cH;

  // 이미지는 컨테이너 내 수직 중앙 정렬
  const imgBottom = cTop + (cH + renderedH) / 2;
  const eslKey = document.getElementById('i-esl').value;
  const offset = eslKey === '13' ? -8 : -12;
  elPnameWrap.style.top = (imgBottom + offset) + 'px';
}

function loadImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    imgSrc = ev.target.result;
    document.getElementById('prev-img').src = imgSrc;
    show(document.getElementById('prev-img'), true);
    show(document.getElementById('upload-ph'), false);
    show(document.getElementById('btn-clr'), true);
    render();
  };
  r.readAsDataURL(file);
}

function clearImg(e) {
  e.stopPropagation(); imgSrc = null;
  document.getElementById('i-img').value = '';
  document.getElementById('prev-img').src = '';
  show(document.getElementById('prev-img'), false);
  show(document.getElementById('upload-ph'), true);
  show(document.getElementById('btn-clr'), false);
  document.getElementById('el-pname-wrap').style.top = '';
  render();
}

async function dlPNG() {
  const btn = document.getElementById('btn-dl');
  btn.disabled = true; btn.textContent = '생성 중...';
  try {
    const key = document.getElementById('i-esl').value;
    const { w, h } = ESL_SIZES[key];
    const pop = document.getElementById('pop');
    const scale = w / pop.offsetWidth;  // 정확한 출력 해상도
    const canvas = await html2canvas(pop, {
      scale, useCORS: true, allowTaint: true, backgroundColor: null, logging: false
    });
    const a = document.createElement('a');
    const nm = document.getElementById('i-promo').value.replace(/\s/g,'_');
    const eslLabel = document.getElementById('i-esl').options[document.getElementById('i-esl').selectedIndex].text.split('—')[0].trim();
    a.download = '솔담_POP_' + nm + '_' + eslLabel + '_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png'); a.click();
  } catch(err) { alert('오류: ' + err.message); }
  btn.disabled = false; btn.textContent = '⬇ PNG 다운로드';
}

changeESL();  // 초기 사이즈 설정
window.addEventListener('resize', () => { changeESL(); adjustTitleFont(); updatePnamePosition(); });
</script>
